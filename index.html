<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Optimizer Pro</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236c5ce7'/><text x='50' y='62' font-size='50' text-anchor='middle' fill='white'>🖼</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="./heic-support.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        [data-theme="dark"]{--bg-primary:#0a0a0f;--bg-secondary:#12121a;--bg-tertiary:#1a1a2e;--bg-card:#16163a;--accent:#6c5ce7;--accent-light:#a29bfe;--accent-glow:rgba(108,92,231,0.3);--success:#00cec9;--success-glow:rgba(0,206,201,0.3);--warning:#fdcb6e;--danger:#ff6b6b;--text-primary:#fff;--text-secondary:#b2b2d0;--text-muted:#6c6c8a;--border:rgba(108,92,231,0.15);--border-hover:rgba(108,92,231,0.4);--checker1:#1a1a2e;--checker2:#22223a;--shadow:0 8px 32px rgba(0,0,0,0.4);--shadow-glow:0 0 40px var(--accent-glow);--grad-bg:radial-gradient(ellipse at 20% 0%,rgba(108,92,231,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(0,206,201,0.05) 0%,transparent 50%);}
        [data-theme="light"]{--bg-primary:#f0f2f5;--bg-secondary:#ffffff;--bg-tertiary:#e8eaf0;--bg-card:#f8f9fc;--accent:#6c5ce7;--accent-light:#6c5ce7;--accent-glow:rgba(108,92,231,0.15);--success:#00a89e;--success-glow:rgba(0,168,158,0.15);--warning:#e67e22;--danger:#e74c3c;--text-primary:#1a1a2e;--text-secondary:#4a4a6a;--text-muted:#8888a8;--border:rgba(108,92,231,0.12);--border-hover:rgba(108,92,231,0.3);--checker1:#e8eaf0;--checker2:#dddfe5;--shadow:0 4px 16px rgba(0,0,0,0.06);--shadow-glow:0 0 20px var(--accent-glow);--grad-bg:radial-gradient(ellipse at 20% 0%,rgba(108,92,231,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(0,206,201,0.03) 0%,transparent 50%);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s;}
        body::before{content:'';position:fixed;inset:0;background:var(--grad-bg);pointer-events:none;z-index:0;}
        .app{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:20px;}
        .top-bar{display:flex;justify-content:flex-end;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
        .top-btn{padding:6px 12px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-muted);border-radius:99px;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:4px;}
        .top-btn:hover{border-color:var(--accent);color:var(--text-primary);}
        .top-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
        .header{text-align:center;padding:28px 0;}
        .header h1{font-size:clamp(28px,5vw,48px);font-weight:900;letter-spacing:-1.5px;background:linear-gradient(135deg,var(--text-primary) 0%,var(--accent-light) 50%,var(--success) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
        .header p{color:var(--text-secondary);font-size:14px;margin-top:8px;max-width:600px;margin-left:auto;margin-right:auto;}
        .pwa-install{display:none;margin-top:12px;}
        .presets{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
        .preset-btn{padding:8px 14px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-secondary);border-radius:99px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:5px;}
        .preset-btn:hover{border-color:var(--accent);color:var(--text-primary);background:rgba(108,92,231,0.08);}
        .preset-btn.active{background:linear-gradient(135deg,var(--accent),#8b7cf7);border-color:transparent;color:#fff;box-shadow:0 4px 16px var(--accent-glow);}
        .preset-btn .ps{font-size:9px;opacity:0.7;}
        .preset-btn.custom{border-style:dashed;}
        .preset-btn .del-preset{margin-left:4px;opacity:0.6;font-size:10px;background:none;border:none;color:inherit;cursor:pointer;}
        .preset-btn .del-preset:hover{opacity:1;color:var(--danger);}
        .save-preset-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
        .save-preset-row input{padding:8px 12px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'Inter',sans-serif;font-size:12px;outline:none;width:180px;}
        .save-preset-row input:focus{border-color:var(--accent);}
        .controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px;}
        .card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;padding:20px 22px;transition:all 0.3s;}
        .card:hover{border-color:var(--border-hover);box-shadow:var(--shadow-glow);}
        .card label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:10px;}
        .card .val{font-size:30px;font-weight:800;color:var(--accent-light);line-height:1;margin-bottom:8px;}
        .card input[type="range"]{width:100%;-webkit-appearance:none;height:5px;background:var(--bg-tertiary);border-radius:3px;outline:none;cursor:pointer;}
        .card input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:linear-gradient(135deg,var(--accent),var(--accent-light));border-radius:50%;cursor:pointer;box-shadow:0 0 8px var(--accent-glow);}
        .fmt-sel{display:flex;gap:6px;flex-wrap:wrap;}
        .fmt-btn{flex:1;min-width:55px;padding:9px;border:2px solid var(--border);background:var(--bg-tertiary);color:var(--text-secondary);border-radius:10px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;position:relative;}
        .fmt-btn:hover:not(.disabled){border-color:var(--accent);color:var(--text-primary);}
        .fmt-btn.active{background:linear-gradient(135deg,var(--accent),#8b7cf7);border-color:var(--accent);color:#fff;box-shadow:0 4px 16px var(--accent-glow);}
        .fmt-btn.disabled{opacity:0.3;cursor:not-allowed;}
        .fmt-btn .unsup{position:absolute;top:-7px;right:-7px;background:var(--danger);color:#fff;font-size:7px;padding:2px 4px;border-radius:99px;font-weight:700;}
        .fixed-sec{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
        .fixed-row{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap;}
        .fixed-row input[type="number"]{width:80px;padding:8px 10px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'Inter',sans-serif;font-size:12px;outline:none;}
        .fixed-row input:focus{border-color:var(--accent);}
        .fixed-row input:disabled{opacity:0.3;}
        .fixed-row span{font-size:12px;color:var(--text-muted);}
        .fixed-row select{padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'Inter',sans-serif;font-size:12px;outline:none;cursor:pointer;-webkit-appearance:none;}
        .drop{border:2px dashed var(--border);border-radius:16px;padding:40px 30px;text-align:center;cursor:pointer;transition:all 0.35s;background:var(--bg-secondary);margin-bottom:20px;position:relative;overflow:hidden;}
        .drop::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,var(--accent-glow),transparent 70%);opacity:0;transition:opacity 0.35s;}
        .drop.drag-over{border-color:var(--accent);background:rgba(108,92,231,0.05);transform:scale(1.003);}
        .drop.drag-over::before{opacity:1;}
        .drop-icon{font-size:42px;margin-bottom:10px;display:block;position:relative;z-index:1;}
        .drop h3{font-size:16px;font-weight:700;margin-bottom:4px;position:relative;z-index:1;}
        .drop p{color:var(--text-muted);font-size:12px;position:relative;z-index:1;margin-bottom:4px;}
        .drop-buttons{display:flex;gap:10px;justify-content:center;margin-top:14px;position:relative;z-index:1;flex-wrap:wrap;}
        .folder-info{background:var(--bg-tertiary);border:1px solid var(--border);border-radius:10px;padding:12px 18px;margin-bottom:20px;display:none;font-size:12px;color:var(--text-secondary);}
        .folder-info.vis{display:block;}
        .folder-info strong{color:var(--accent-light);}
        .folder-tree{margin-top:8px;font-family:'SF Mono','Consolas',monospace;font-size:11px;color:var(--text-muted);line-height:1.8;}
        .folder-tree .folder-icon{color:var(--warning);margin-right:4px;}
        .folder-tree .file-count{font-size:10px;}
        #fileInputFiles,#fileInputFolder,#wmImgInput{display:none;}
        .actions{display:none;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
        .actions.vis{display:flex;}
        .btn{padding:11px 20px;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.25s;display:inline-flex;align-items:center;gap:6px;}
        .btn:disabled{opacity:0.3;cursor:not-allowed;}
        .btn-p{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 4px 16px var(--accent-glow);}
        .btn-p:hover:not(:disabled){transform:translateY(-1px);}
        .btn-s{background:linear-gradient(135deg,var(--success),#00b894);color:#fff;box-shadow:0 4px 16px var(--success-glow);}
        .btn-s:hover:not(:disabled){transform:translateY(-1px);}
        .btn-o{background:transparent;border:2px solid var(--border);color:var(--text-secondary);}
        .btn-o:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
        .btn-sm{padding:7px 12px;font-size:10px;}
        .spacer{flex:1;}
        .fcb{background:var(--bg-tertiary);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-weight:600;font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:6px;}
        .fcb strong{color:var(--accent-light);font-size:16px;}
        .coll{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;margin-bottom:16px;overflow:hidden;display:none;}
        .coll.vis{display:block;}
        .coll-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none;transition:background 0.2s;}
        .coll-h:hover{background:rgba(108,92,231,0.04);}
        .coll-h h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
        .chev{color:var(--text-muted);font-size:11px;transition:transform 0.3s;}
        .coll.open .chev{transform:rotate(180deg);}
        .coll-b{display:none;padding:0 20px 20px;border-top:1px solid var(--border);}
        .coll.open .coll-b{display:block;}
        .sbadge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:99px;background:rgba(178,178,208,0.1);color:var(--text-muted);}
        .sbadge.on{background:rgba(0,206,201,0.15);color:var(--success);}
        .fgrid{display:grid;gap:12px;margin-top:14px;}
        .fgrid.c3{grid-template-columns:2fr 1fr 1fr;}
        .fgrid.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
        .fld label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:5px;}
        .fld input[type="text"],.fld input[type="number"],.fld select,.fld input[type="color"]{width:100%;padding:9px 11px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'Inter',sans-serif;font-size:12px;outline:none;transition:border-color 0.2s;}
        .fld input:focus,.fld select:focus{border-color:var(--accent);}
        .fld input:disabled,.fld select:disabled{opacity:0.3;cursor:not-allowed;}
        .fld select{-webkit-appearance:none;cursor:pointer;}
        .fld input[type="color"]{height:36px;padding:2px 4px;cursor:pointer;}
        .chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
        .chip{font-size:9px;font-weight:600;font-family:'SF Mono','Consolas',monospace;background:var(--bg-tertiary);border:1px solid var(--border);color:var(--accent-light);padding:2px 7px;border-radius:99px;cursor:pointer;transition:all 0.2s;}
        .chip:hover{border-color:var(--accent);background:rgba(108,92,231,0.1);}
        .opts{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
        .tw{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;}
        .tw>span{font-size:11px;font-weight:600;color:var(--text-secondary);}
        .tg{position:relative;width:38px;height:20px;flex-shrink:0;}
        .tg input{opacity:0;width:0;height:0;position:absolute;}
        .tg-s{position:absolute;inset:0;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:99px;transition:all 0.25s;}
        .tg-s::before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:var(--text-muted);border-radius:50%;transition:all 0.25s;}
        .tg input:checked+.tg-s{background:linear-gradient(135deg,var(--accent),#8b7cf7);border-color:var(--accent);}
        .tg input:checked+.tg-s::before{transform:translateX(18px);background:#fff;}
        .rprev{margin-top:14px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;padding:12px 14px;}
        .rprev-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:6px;}
        .rp-r{display:flex;align-items:center;gap:6px;font-family:'SF Mono','Consolas',monospace;font-size:10.5px;padding:3px 0;overflow:hidden;}
        .rp-r .old{color:var(--text-muted);text-decoration:line-through;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:36%;}
        .rp-r .ar{color:var(--accent-light);flex-shrink:0;}
        .rp-r .nw{color:var(--success);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .wm-up{border:2px dashed var(--border);border-radius:6px;padding:12px;text-align:center;cursor:pointer;transition:all 0.2s;margin-top:5px;}
        .wm-up:hover{border-color:var(--accent);}
        .wm-up.has{border-style:solid;border-color:var(--success);}
        .wm-th{max-height:36px;max-width:100%;border-radius:4px;}
        .wm-prev-box{margin-top:14px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;padding:16px;text-align:center;}
        .wm-prev-box canvas{max-width:100%;border-radius:6px;border:1px solid var(--border);}
        .wm-tabs{display:flex;gap:0;margin-top:14px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
        .wm-tab{flex:1;padding:10px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg-tertiary);color:var(--text-muted);transition:all 0.2s;border:none;font-family:'Inter',sans-serif;}
        .wm-tab.active{background:var(--accent);color:#fff;}
        .wm-tab:hover:not(.active){color:var(--text-primary);}
        .prog{margin-bottom:20px;display:none;}.prog.vis{display:block;}
        .prog-out{background:var(--bg-tertiary);border-radius:99px;height:7px;overflow:hidden;margin-bottom:6px;}
        .prog-in{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));border-radius:99px;width:0%;transition:width 0.3s;}
        .prog-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);font-weight:500;}
        .savings{background:linear-gradient(135deg,rgba(108,92,231,0.1),rgba(0,206,201,0.08));border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px;display:none;}.savings.vis{display:block;}
        .sg{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;text-align:center;}
        .si .sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:4px;}
        .si .sv{font-size:28px;font-weight:900;}
        .sv.vo{color:var(--text-secondary);}.sv.vp{color:var(--accent-light);}.sv.vs{color:var(--success);}
        .sv.vt{background:linear-gradient(135deg,var(--success),#55efc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:40px;}
        .tw-wrap{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
        .tt{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
        .tt h3{font-size:14px;font-weight:700;}
        .tt-a{display:flex;gap:6px;align-items:center;}
        .ts{max-height:550px;overflow-y:auto;}
        .ts::-webkit-scrollbar{width:4px;}.ts::-webkit-scrollbar-track{background:var(--bg-secondary);}.ts::-webkit-scrollbar-thumb{background:var(--bg-tertiary);border-radius:3px;}
        table{width:100%;border-collapse:collapse;}
        thead{position:sticky;top:0;z-index:2;}
        thead th{background:var(--bg-tertiary);padding:10px 14px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap;}
        tbody tr{border-bottom:1px solid rgba(128,128,128,0.06);transition:background 0.15s,opacity 0.2s;}
        tbody tr:hover{background:rgba(108,92,231,0.04);}
        tbody tr.unsel{opacity:0.3;}
        tbody tr.dragging{opacity:0.25;background:rgba(108,92,231,0.08);}
        tbody tr.drop-above{border-top:2px solid var(--accent);}
        tbody td{padding:8px 14px;font-size:11px;vertical-align:middle;}
        .cbc{width:32px;text-align:center;}
        .cbc input[type="checkbox"]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;}
        .drag-handle{width:28px;text-align:center;cursor:grab;font-size:14px;color:var(--text-muted);user-select:none;padding:4px;}
        .drag-handle:hover{color:var(--accent-light);}
        .drag-handle:active{cursor:grabbing;color:var(--accent);}
        .fic{display:flex;align-items:center;gap:8px;}
        .fthumb{width:32px;height:32px;border-radius:4px;object-fit:cover;border:1px solid var(--border);background:var(--bg-tertiary);flex-shrink:0;}
        .fname{font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;cursor:pointer;padding:1px 0;border-bottom:1px dashed transparent;transition:border-color 0.2s;}
        .fname:hover{border-bottom-color:var(--accent-light);}
        .fname-input{background:var(--bg-tertiary);border:1px solid var(--accent);border-radius:4px;color:var(--text-primary);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:3px 6px;width:180px;outline:none;}
        .fsub{font-size:9px;color:var(--text-muted);}
        .fsub .folder-path{color:var(--warning);}
        .fnew{font-size:9px;color:var(--success);font-family:'SF Mono','Consolas',monospace;}
        .so{color:var(--text-secondary);font-weight:500;}
        .sopt{color:var(--accent-light);font-weight:600;}
        .bdg{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;}
        .bdg.great{background:rgba(0,206,201,0.15);color:var(--success);}
        .bdg.good{background:rgba(253,203,110,0.15);color:var(--warning);}
        .bdg.low{background:rgba(178,178,208,0.1);color:var(--text-muted);}
        .sc{display:flex;align-items:center;gap:4px;}
        .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
        .dot.pending{background:var(--text-muted);}.dot.processing{background:var(--warning);animation:pulse 1s infinite;}.dot.done{background:var(--success);}.dot.error{background:var(--danger);}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
        .ra{display:flex;gap:3px;}
        .rb{background:transparent;border:none;color:var(--text-muted);font-size:12px;cursor:pointer;padding:3px 5px;border-radius:4px;transition:all 0.15s;}
        .rb:hover{color:var(--text-primary);background:rgba(128,128,128,0.1);}
        .rb.dng:hover{color:var(--danger);background:rgba(255,107,107,0.1);}
        .crop-tag{font-size:9px;background:rgba(108,92,231,0.15);color:var(--accent-light);padding:1px 6px;border-radius:99px;margin-right:4px;font-weight:600;cursor:pointer;border:none;}
        .crop-tag:hover{background:rgba(255,107,107,0.2);color:var(--danger);}
        .empty{text-align:center;padding:50px 30px;color:var(--text-muted);}
        .empty .ei{font-size:36px;margin-bottom:10px;opacity:0.5;}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;padding:24px;}
        .modal.vis{display:flex;}
        .modal-c{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;max-width:900px;width:100%;max-height:90vh;overflow:auto;padding:24px;}
        .modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
        .modal-h h3{font-size:15px;font-weight:700;}
        .modal-x{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-secondary);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
        .modal-x:hover{border-color:var(--danger);color:var(--danger);}
        .pcomp{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        .ppanel{text-align:center;}
        .ppanel img{max-width:100%;max-height:350px;border-radius:10px;border:1px solid var(--border);}
        .ppanel .pl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-top:8px;}
        .crop-container{position:relative;display:inline-block;margin:0 auto 16px;background:var(--checker1);border-radius:8px;overflow:hidden;line-height:0;}
        .crop-canvas{display:block;max-width:100%;max-height:400px;margin:0 auto;}
        .crop-overlay{position:absolute;inset:0;pointer-events:none;}
        .crop-box{position:absolute;border:2px solid rgba(255,255,255,0.9);cursor:move;box-shadow:0 0 0 9999px rgba(0,0,0,0.55);z-index:5;}
        .crop-handle{position:absolute;width:14px;height:14px;background:#fff;border:2px solid var(--accent);border-radius:50%;z-index:6;}
        .crop-handle.se{bottom:-7px;right:-7px;cursor:se-resize;}
        .crop-handle.ne{top:-7px;right:-7px;cursor:ne-resize;}
        .crop-handle.sw{bottom:-7px;left:-7px;cursor:sw-resize;}
        .crop-handle.nw{top:-7px;left:-7px;cursor:nw-resize;}
        .crop-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;justify-content:center;}
        .crop-preset-btn{padding:8px 16px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-secondary);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;}
        .crop-preset-btn:hover{border-color:var(--accent);color:var(--text-primary);}
        .crop-preset-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
        .crop-info{text-align:center;font-size:12px;color:var(--text-muted);margin-bottom:16px;}
        .crop-actions{display:flex;gap:10px;justify-content:center;}
        .drag-ghost{position:fixed;z-index:10000;pointer-events:none;display:flex;align-items:center;gap:8px;background:var(--bg-secondary);border:1px solid var(--accent);border-radius:10px;padding:8px 14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-width:280px;}
        .drag-ghost img{width:40px;height:40px;border-radius:4px;object-fit:cover;border:1px solid var(--border);}
        .drag-ghost .dg-name{font-size:11px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
        .toasts{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:5px;}
        .toast{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:11px;font-weight:600;color:var(--text-primary);box-shadow:var(--shadow);animation:sIT 0.3s ease,fOT 0.3s ease 2.7s forwards;display:flex;align-items:center;gap:5px;}
        .toast.success{border-left:3px solid var(--success);}.toast.error{border-left:3px solid var(--danger);}.toast.info{border-left:3px solid var(--accent);}
        @keyframes sIT{from{transform:translateX(60px);opacity:0;}to{transform:translateX(0);opacity:1;}}
        @keyframes fOT{to{opacity:0;transform:translateY(6px);}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
        .fin{animation:fadeIn 0.3s ease forwards;}
        @media(max-width:900px){.controls{grid-template-columns:1fr;}.sg{grid-template-columns:1fr 1fr;}.fgrid.c3,.fgrid.c4{grid-template-columns:1fr;}.pcomp{grid-template-columns:1fr;}}
        @media(max-width:600px){.app{padding:10px;}.sg{grid-template-columns:1fr;}}
        .search-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
        .search-box{position:relative;flex:1;min-width:180px;}
        .search-box input{width:100%;padding:9px 12px 9px 30px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'Inter',sans-serif;font-size:12px;outline:none;}
        .search-box input:focus{border-color:var(--accent);}
        .search-box::before{content:'🔎';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;opacity:0.6;pointer-events:none;}
        .sortable{cursor:pointer;user-select:none;}
        .sortable:hover{color:var(--accent-light);}
        .sort-arrow{margin-left:3px;opacity:0.5;font-size:8px;}
        .sort-arrow.on{opacity:1;color:var(--accent-light);}
        .dup-badge{font-size:9px;background:rgba(253,203,110,0.18);color:var(--warning);padding:1px 6px;border-radius:99px;margin-right:4px;font-weight:600;}
        .xform-btn{background:transparent;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;padding:3px 4px;border-radius:4px;transition:all 0.15s;}
        .xform-btn:hover{color:var(--text-primary);background:rgba(128,128,128,0.1);}
        .xform-tag{font-size:9px;background:rgba(0,206,201,0.15);color:var(--success);padding:1px 6px;border-radius:99px;margin-right:4px;font-weight:600;}
        .session-banner{background:linear-gradient(135deg,rgba(108,92,231,0.12),rgba(0,206,201,0.08));border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:16px;display:none;align-items:center;gap:14px;flex-wrap:wrap;}
        .session-banner.vis{display:flex;}
        .session-banner .sb-txt{flex:1;font-size:12px;color:var(--text-secondary);min-width:200px;}
        .session-banner .sb-txt strong{color:var(--text-primary);}
        .crop-thumbs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;justify-content:center;flex-wrap:wrap;}
        .crop-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;border:2px solid var(--border);cursor:pointer;transition:all 0.2s;flex-shrink:0;opacity:0.6;}
        .crop-thumb:hover{opacity:0.9;}
        .crop-thumb.active{border-color:var(--accent);opacity:1;box-shadow:0 0 0 2px var(--accent-glow);}
        #btnUndo{display:none;}
        .search-box input{padding-right:28px;}
        .search-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:50%;line-height:1;}
        .search-clear:hover{color:var(--danger);background:rgba(255,107,107,0.1);}
        .icon-legend{display:none;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin:0 0 14px;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px 16px;}
        .icon-legend.vis{display:grid;}
        .legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-secondary);}
        .legend-item .li-ic{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:22px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--accent-light);flex-shrink:0;}
        .crop-anchor-row{display:none;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
        .crop-anchor-row.vis{display:flex;}
        .crop-anchor-row select{padding:7px 10px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;}
        .crop-anchor-note{font-size:10.5px;color:var(--text-muted);text-align:center;margin-bottom:14px;line-height:1.5;}
    </style>
</head>
<body>
<div class="app">
    <div class="session-banner" id="sessionBanner"><span style="font-size:22px">💾</span><div class="sb-txt"><strong data-i18n="sessionFound"></strong> — <span id="sessionInfo"></span></div><button class="btn btn-p btn-sm" onclick="restoreSession()">↩️ <span data-i18n="sessionRestore"></span></button><button class="btn btn-o btn-sm" onclick="dismissSession()">✕ <span data-i18n="sessionDismiss"></span></button></div>
    <div class="top-bar">
        <button class="top-btn" id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
        <button class="top-btn active" id="langIt" onclick="setLang('it')">🇮🇹 IT</button>
        <button class="top-btn" id="langEn" onclick="setLang('en')">🇬🇧 EN</button>
    </div>
    <header class="header"><h1>Image Optimizer Pro</h1><p data-i18n="subtitle"></p><div class="pwa-install" id="pwaInstall"><button class="btn btn-p btn-sm" onclick="installPWA()">📲 <span data-i18n="installApp"></span></button></div></header>
    <section class="presets" id="presetsBar"></section>
    <div class="save-preset-row"><input type="text" id="presetName" data-i18n-placeholder="presetPlaceholder"><button class="btn btn-sm btn-p" onclick="saveCustomPreset()">💾 <span data-i18n="savePreset"></span></button></div>
    <section class="controls">
        <div class="card"><label data-i18n="quality"></label><div class="val" id="qVal">75%</div><input type="range" id="qSlider" min="10" max="100" value="75"></div>
        <div class="card"><label data-i18n="maxRes"></label><div class="val" id="rVal">1200px</div><input type="range" id="rSlider" min="200" max="4000" value="1200" step="50"><div class="fixed-sec"><label class="tw"><div class="tg"><input type="checkbox" id="fixedEnabled" onchange="onFixedChange()"><span class="tg-s"></span></div><span data-i18n="fixedSize"></span></label><div class="fixed-row" id="fixedRow" style="display:none"><input type="number" id="fixedW" value="1000" min="50" max="5000" disabled><span>×</span><input type="number" id="fixedH" value="1000" min="50" max="5000" disabled><span>px</span><select id="fixedPad" disabled onchange="document.getElementById('fixedColor').style.display=this.value==='custom'?'inline-block':'none';"><option value="#ffffff" data-i18n="white"></option><option value="#000000" data-i18n="black"></option><option value="transparent" data-i18n="transparent"></option><option value="custom" data-i18n="customColor"></option></select><input type="color" id="fixedColor" value="#ffffff" style="display:none;width:40px" disabled></div></div></div>
        <div class="card"><label data-i18n="outputFormat"></label><div style="margin-bottom:8px;font-size:12px;color:var(--text-secondary)" id="fmtDesc"></div><div class="fmt-sel" id="fmtSel"></div></div>
    </section>
    <div class="drop" id="dropZone"><span class="drop-icon">📁</span><h3 data-i18n="dropTitle"></h3><p data-i18n="dropSubtitle"></p><div class="drop-buttons"><button class="btn btn-p btn-sm" onclick="event.stopPropagation();document.getElementById('fileInputFiles').click();">📄 <span data-i18n="selectFiles"></span></button><button class="btn btn-s btn-sm" onclick="event.stopPropagation();document.getElementById('fileInputFolder').click();">📂 <span data-i18n="selectFolder"></span></button></div></div>
    <input type="file" id="fileInputFiles" multiple accept="image/*,.heic,.heif"><input type="file" id="fileInputFolder" multiple webkitdirectory><input type="file" id="wmImgInput" accept="image/png,image/svg+xml,image/webp">
    <div class="folder-info" id="folderInfo"><strong>📂 <span data-i18n="folderStructure"></span></strong><div class="folder-tree" id="folderTree"></div></div>
    <section class="actions" id="actionBar">
        <button class="btn btn-p" id="btnOpt" onclick="startOptimization()">⚡ <span data-i18n="optimizeAll"></span></button>
        <button class="btn btn-s" id="btnDl" onclick="downloadZip()" disabled>📦 <span data-i18n="downloadZip"></span></button>
        <button class="btn btn-s" id="btnSaveFolder" onclick="saveToFolder()" disabled>💾 <span data-i18n="saveFolder"></span></button>
        <button class="btn btn-o" onclick="openCropModal()">✂️ <span data-i18n="crop"></span></button>
        <button class="btn btn-o" id="btnUndo" onclick="undoLastOptimization()">↩️ <span data-i18n="undo"></span></button>
        <button class="btn btn-o" id="btnDupes" style="display:none" onclick="removeDuplicates()">🧹 <span data-i18n="removeDupes"></span></button>
        <button class="btn btn-o" style="border-color:var(--danger);color:var(--danger);" onclick="clearAll()">🗑️ <span data-i18n="clearAll"></span></button>
        <div class="spacer"></div>
        <div class="fcb">📷 <strong id="fCnt">0</strong> <span id="selInfo"></span><span id="engineBadge" style="margin-left:6px;opacity:0.65;font-weight:500"></span></div>
    </section>
    <div class="search-row" id="searchRow" style="display:none;margin-bottom:16px"><div class="search-box"><input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" oninput="onSearchInput()"><button class="search-clear" id="searchClearBtn" style="display:none" onclick="clearSearch()" data-i18n-title="searchClearTitle">✕</button></div></div>
    <!-- RENAME -->
    <section class="coll" id="renamePanel"><div class="coll-h" onclick="toggleSec('renamePanel')"><h3>✏️ <span data-i18n="batchRename"></span> <span class="sbadge" id="rnBdg"></span></h3><span class="chev">▼</span></div><div class="coll-b"><div class="opts"><label class="tw"><div class="tg"><input type="checkbox" id="rnEnabled" onchange="onRnChange()"><span class="tg-s"></span></div><span data-i18n="renamePattern"></span></label><label class="tw"><div class="tg"><input type="checkbox" id="seoSlug" checked onchange="onRnChange()"><span class="tg-s"></span></div><span data-i18n="seoFriendly"></span></label><label class="tw"><div class="tg"><input type="checkbox" id="keepFolders" checked onchange="onRnChange()"><span class="tg-s"></span></div><span data-i18n="keepFolders"></span></label></div><div class="fgrid c3"><div class="fld"><label data-i18n="pattern"></label><input type="text" id="rnPattern" value="product-{n}" disabled oninput="onRnChange()"><div class="chips"><span class="chip" onclick="insPH('{nome}')">{nome}</span><span class="chip" onclick="insPH('{n}')">{n}</span><span class="chip" onclick="insPH('{data}')">{data}</span><span class="chip" onclick="insPH('{cartella}')">{cartella}</span></div></div><div class="fld"><label data-i18n="startNum"></label><input type="number" id="rnStart" value="1" min="0" disabled oninput="onRnChange()"></div><div class="fld"><label data-i18n="padding"></label><input type="number" id="rnPad" value="3" min="1" max="8" disabled oninput="onRnChange()"></div></div><div class="rprev"><div class="rprev-t" data-i18n="namePreview"></div><div id="rnPrevRows"></div></div></div></section>
    <!-- METADATA -->
    <section class="coll" id="metadataPanel"><div class="coll-h" onclick="toggleSec('metadataPanel')"><h3>📝 <span data-i18n="metadata"></span> <span class="sbadge" id="metaBdg"></span></h3><span class="chev">▼</span></div><div class="coll-b"><div class="opts"><label class="tw"><div class="tg"><input type="checkbox" id="stripExif" checked onchange="onMetaChange()"><span class="tg-s"></span></div><span data-i18n="stripExif"></span></label></div><div class="fgrid c3" style="margin-top:14px"><div class="fld"><label data-i18n="copyright"></label><input type="text" id="copyrightText" placeholder="© 2025 Your Name" oninput="onMetaChange()"></div></div><p style="font-size:11px;color:var(--text-muted);margin-top:12px;line-height:1.6" data-i18n="metadataNote"></p></div></section>
    <!-- WATERMARK -->
    <section class="coll" id="wmPanel"><div class="coll-h" onclick="toggleSec('wmPanel')"><h3>💧 Watermark <span class="sbadge" id="wmBdg"></span></h3><span class="chev">▼</span></div><div class="coll-b"><div class="opts"><label class="tw"><div class="tg"><input type="checkbox" id="wmEnabled" onchange="onWmChange()"><span class="tg-s"></span></div><span data-i18n="applyWatermark"></span></label></div><div class="wm-tabs"><button class="wm-tab active" onclick="setWmTab('image',this)">🖼️ <span data-i18n="image"></span></button><button class="wm-tab" onclick="setWmTab('text',this)">✍️ <span data-i18n="text"></span></button></div><div id="wmImageConfig"><div class="fgrid c4"><div class="fld"><label data-i18n="wmLogo"></label><div class="wm-up" id="wmUpArea" onclick="document.getElementById('wmImgInput').click()"><span id="wmUpContent" style="font-size:11px;color:var(--text-muted)" data-i18n="uploadPng"></span></div></div><div class="fld"><label data-i18n="position"></label><select id="wmPos" onchange="updWmPrev()"><option value="bottom-right">↘</option><option value="bottom-left">↙</option><option value="top-right">↗</option><option value="top-left">↖</option><option value="center">⊕</option></select></div><div class="fld"><label data-i18n="opacity"></label><div style="display:flex;align-items:center;gap:6px"><input type="range" id="wmOpacity" min="5" max="100" value="30" oninput="document.getElementById('wmOpVal').textContent=this.value+'%';updWmPrev();" style="flex:1;height:5px"><span id="wmOpVal" style="font-size:12px;font-weight:700;color:var(--accent-light)">30%</span></div></div><div class="fld"><label data-i18n="sizePercent"></label><div style="display:flex;align-items:center;gap:6px"><input type="range" id="wmScale" min="5" max="60" value="20" oninput="document.getElementById('wmScVal').textContent=this.value+'%';updWmPrev();" style="flex:1;height:5px"><span id="wmScVal" style="font-size:12px;font-weight:700;color:var(--accent-light)">20%</span></div></div></div></div><div id="wmTextConfig" style="display:none"><div class="fgrid c4"><div class="fld"><label data-i18n="text"></label><input type="text" id="wmText" value="© My Brand" oninput="updWmPrev()"></div><div class="fld"><label>Font</label><select id="wmFont" onchange="updWmPrev()"><option>Inter</option><option>Arial</option><option>Georgia</option><option>Courier New</option><option>Verdana</option></select></div><div class="fld"><label data-i18n="color"></label><input type="color" id="wmColor" value="#ffffff" oninput="updWmPrev()"></div><div class="fld"><label data-i18n="position"></label><select id="wmTextPos" onchange="updWmPrev()"><option value="bottom-right">↘</option><option value="bottom-left">↙</option><option value="top-right">↗</option><option value="top-left">↖</option><option value="center">⊕</option></select></div></div><div class="fgrid c3" style="margin-top:10px"><div class="fld"><label data-i18n="sizePercent"></label><div style="display:flex;align-items:center;gap:6px"><input type="range" id="wmTextSize" min="2" max="20" value="5" oninput="document.getElementById('wmTSVal').textContent=this.value+'%';updWmPrev();" style="flex:1;height:5px"><span id="wmTSVal" style="font-size:12px;font-weight:700;color:var(--accent-light)">5%</span></div></div><div class="fld"><label data-i18n="opacity"></label><div style="display:flex;align-items:center;gap:6px"><input type="range" id="wmTextOpacity" min="5" max="100" value="40" oninput="document.getElementById('wmTOVal').textContent=this.value+'%';updWmPrev();" style="flex:1;height:5px"><span id="wmTOVal" style="font-size:12px;font-weight:700;color:var(--accent-light)">40%</span></div></div><div class="fld"><label data-i18n="rotation"></label><select id="wmTextRot" onchange="updWmPrev()"><option value="0">0°</option><option value="-30">-30°</option><option value="-45">-45°</option></select></div></div></div><div class="wm-prev-box" id="wmPrevBox" style="display:none"><div class="rprev-t" data-i18n="wmPreview"></div><canvas id="wmPrevCanvas" width="340" height="220"></canvas></div></div></section>
    <!-- PROGRESS & SAVINGS -->
    <section class="prog" id="progSec"><div class="prog-out"><div class="prog-in" id="progBar"></div></div><div class="prog-info"><span id="progText">...</span><span id="progEta"></span></div></section>
    <section class="savings" id="savBanner"><div class="sg"><div class="si"><div class="sl" data-i18n="totalOriginal"></div><div class="sv vo" id="totO">0</div></div><div class="si"><div class="sl" data-i18n="totalOptimized"></div><div class="sv vp" id="totP">0</div></div><div class="si"><div class="sl" data-i18n="bandwidthSaved"></div><div class="sv vs" id="totS">0</div></div><div class="si"><div class="sl" data-i18n="totalSavings"></div><div class="sv vt" id="totT">0%</div></div></div></section>
    <!-- TABLE -->
    <section class="tw-wrap">
        <div class="tt"><h3>📋 <span data-i18n="details"></span> <span style="font-size:11px;color:var(--text-muted);font-weight:500" id="tCnt"></span></h3><div class="tt-a"><button class="btn btn-sm btn-o" onclick="toggleLegend()" data-i18n-title="legendBtn">ℹ️ <span data-i18n="legendBtn"></span></button><button class="btn btn-sm btn-o" onclick="selAll(true)" style="border-color:var(--border);color:var(--text-muted)">☑</button><button class="btn btn-sm btn-o" onclick="selAll(false)" style="border-color:var(--border);color:var(--text-muted)">☐</button></div></div>
        <div class="icon-legend" id="iconLegend">
            <div class="legend-item"><span class="li-ic">↺</span> <span data-i18n="rotateLeft"></span></div>
            <div class="legend-item"><span class="li-ic">↻</span> <span data-i18n="rotateRight"></span></div>
            <div class="legend-item"><span class="li-ic">⇋</span> <span data-i18n="flipH"></span></div>
            <div class="legend-item"><span class="li-ic">⇅</span> <span data-i18n="flipV"></span></div>
            <div class="legend-item"><span class="li-ic">✂️✕</span> <span data-i18n="legendCropTag"></span></div>
            <div class="legend-item"><span class="li-ic">⧉</span> <span data-i18n="legendDup"></span></div>
            <div class="legend-item"><span class="li-ic">⚠️</span> <span data-i18n="legendFallback"></span></div>
            <div class="legend-item"><span class="li-ic">🔄</span> <span data-i18n="legendRetry"></span></div>

async function checkAvif(){avifSupported=false;try{const c=document.createElement('canvas');c.width=4;c.height=4;c.getContext('2d').fillRect(0,0,4,4);const b=await new Promise(r=>{c.toBlob(r,'image/avif',0.5);setTimeout(()=>r(null),1000);});if(b&&b.type==='image/avif'&&b.size>0)avifSupported=true;}catch(e){}renderFmtBtns();}
function renderFmtBtns(){const el=document.getElementById('fmtSel');el.innerHTML='';[{k:'webp',l:'WebP'},{k:'jpeg',l:'JPEG'},{k:'png',l:'PNG'},{k:'avif',l:'AVIF',chk:true}].forEach(f=>{const b=document.createElement('button');b.className='fmt-btn'+(f.k===currentFormat?' active':'');if(f.chk&&!avifSupported){b.classList.add('disabled');b.title=t('avifWarning');b.innerHTML=f.l+'<span class="unsup">N/S</span>';}else{b.textContent=f.l;b.onclick=()=>setFmt(f.k,b);}el.appendChild(b);});}
function setFmt(f,btn){currentFormat=f;document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyI18n();updRnPrev();clearAP();}

const builtins={thumb:{q:60,r:400,fmt:'webp',label:'🖼️ Thumb',specs:'400·60%'},catalog:{q:75,r:1200,fmt:'webp',label:'📦 Catalog',specs:'1200·75%'},hq:{q:85,r:1600,fmt:'webp',label:'✨ HQ',specs:'1600·85%'},social:{q:80,r:1080,fmt:'webp',label:'📱 Social',specs:'1080·80%'},marketplace:{q:78,r:1500,fmt:'jpeg',label:'🛒 Market',specs:'1500·78%'}};
function getCP(){try{return JSON.parse(localStorage.getItem('cp')||'{}');}catch(e){return{};}}
function saveCP(d){localStorage.setItem('cp',JSON.stringify(d));}
function renderPresets(){const bar=document.getElementById('presetsBar');bar.innerHTML='';Object.entries(builtins).forEach(([k,p])=>{const b=document.createElement('button');b.className='preset-btn';b.dataset.key=k;b.innerHTML=`${p.label} <span class="ps">${p.specs}</span>`;b.onclick=()=>applyPreset(k,false);bar.appendChild(b);});Object.entries(getCP()).forEach(([k,p])=>{const b=document.createElement('button');b.className='preset-btn custom';b.dataset.key='c_'+k;b.innerHTML=`⭐ ${esc(p.label)} <span class="ps">${p.r}·${p.q}%</span><button class="del-preset" onclick="event.stopPropagation();delCP('${esc(k)}')">✕</button>`;b.onclick=()=>applyPreset('c_'+k,true);bar.appendChild(b);});}
function applyPreset(key,isC){let p;if(isC){p=getCP()[key.replace('c_','')];}else{const bp=builtins[key];if(bp)p={q:bp.q,r:bp.r,fmt:bp.fmt};}if(!p)return;document.getElementById('qSlider').value=p.q;document.getElementById('qVal').textContent=p.q+'%';document.getElementById('rSlider').value=p.r;document.getElementById('rVal').textContent=p.r+'px';if(p.fmt&&(p.fmt!=='avif'||avifSupported)){currentFormat=p.fmt;renderFmtBtns();}document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));const a=document.querySelector(`.preset-btn[data-key="${key}"]`);if(a)a.classList.add('active');showToast(t('presetApplied'),'success');}
function saveCustomPreset(){const n=document.getElementById('presetName').value.trim();if(!n)return showToast(t('enterName'),'error');const cp=getCP();cp[n]={label:n,q:+document.getElementById('qSlider').value,r:+document.getElementById('rSlider').value,fmt:currentFormat};saveCP(cp);document.getElementById('presetName').value='';renderPresets();showToast(t('presetSaved'),'success');}

// DROP
const dz=document.getElementById('dropZone');dz.addEventListener('click',e=>{if(e.target.closest('.btn'))return;document.getElementById('fileInputFiles').click();});dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));dz.addEventListener('drop',async e=>{e.preventDefault();dz.classList.remove('drag-over');const items=e.dataTransfer.items;if(items&&items.length&&typeof items[0].webkitGetAsEntry==='function'){const entries=[];for(let i=0;i<items.length;i++){const en=items[i].webkitGetAsEntry();if(en)entries.push(en);}addFiles(await readAllEntries(entries,''));}else addFiles(Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')||window.isHeicFile(f)).map(f=>({file:f,path:''})));});
document.getElementById('fileInputFiles').addEventListener('change',function(){addFiles(Array.from(this.files).filter(f=>f.type.startsWith('image/')||window.isHeicFile(f)).map(f=>({file:f,path:''})));this.value='';});
document.getElementById('fileInputFolder').addEventListener('change',function(){addFiles(Array.from(this.files).filter(f=>f.type.startsWith('image/')||window.isHeicFile(f)).map(f=>{const p=(f.webkitRelativePath||'').split('/');p.pop();if(p.length)p.shift();return{file:f,path:p.join('/')};}));this.value='';});
async function readAllEntries(entries,bp){const r=[];for(const e of entries){if(e.isFile){const f=await gfe(e);if(f&&(f.type.startsWith('image/')||window.isHeicFile(f)))r.push({file:f,path:bp});}else if(e.isDirectory){const sub=await rde(e.createReader());r.push(...await readAllEntries(sub,bp?bp+'/'+e.name:e.name));}}return r;}
function rde(dr){return new Promise(r=>{const a=[];(function b(){dr.readEntries(e=>{if(!e.length)r(a);else{a.push(...e);b();}});})();});}
function gfe(en){return new Promise(r=>en.file(r,()=>r(null)));}
async function addFiles(items){
  if(!items.length)return showToast(t('noImages'),'error');
  items.forEach(i=>i.path=(i.path||'').replace(/^\/+|\/+$/g,''));

  const heicCount=items.filter(i=>window.isHeicFile(i.file)).length;
  if(heicCount>0)showToast(`🔄 ${t('convertingHeic')} (${heicCount})`,'info');

  const converted=[];
  let failCount=0;
  for(const i of items){
    if(window.isHeicFile(i.file)){
      const res=await window.preprocessImageFile(i.file);
      if(res.file)converted.push({file:res.file,path:i.path});
      else failCount++;
    }else{
      converted.push(i);
    }
  }
  if(failCount>0)showToast(`⚠️ ${failCount} ${t('heicFailed')}`,'error');
  if(!converted.length)return;

  files.push(...converted.map(i=>({file:i.file,path:i.path,originalSize:i.file.size,optimizedSize:null,optimizedBlob:null,status:'pending',thumbUrl:null,selected:true,customName:null,editing:false,cropData:null,rotation:0,flipH:false,flipV:false,isDuplicate:false,actualMime:null,formatFallback:false})));hasOpt=false;document.getElementById('btnDl').disabled=true;document.getElementById('savBanner').classList.remove('vis');document.getElementById('searchRow').style.display=files.length>4?'flex':'none';updateFolderInfo();markDuplicates();updateUI();updRnPrev();showToast(`${converted.length} ${t('imagesAdded')}`,'success');saveSession();
}
function updateFolderInfo(){const fi=document.getElementById('folderInfo'),ft=document.getElementById('folderTree'),folders=new Map();files.forEach(f=>{const p=f.path||'';folders.set(p,(folders.get(p)||0)+1);});if(folders.size<=1&&folders.has('')){fi.classList.remove('vis');return;}fi.classList.add('vis');ft.innerHTML=[...folders.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([p,c])=>`<div style="padding-left:${p?(p.split('/').length-1)*16:0}px"><span class="folder-icon">📂</span>${esc(p||'(root)')} <span class="file-count">(${c})</span></div>`).join('');}

// DUPLICATE DETECTION
function dupKey(f){return f.file.name.toLowerCase()+'|'+f.originalSize;}
function markDuplicates(){const seen=new Map();let dupCount=0;files.forEach(f=>{const k=dupKey(f);if(seen.has(k)){f.isDuplicate=true;dupCount++;}else{f.isDuplicate=false;seen.set(k,true);}});const btn=document.getElementById('btnDupes');if(dupCount>0){btn.style.display='inline-flex';btn.innerHTML=`🧹 <span>${t('removeDupes')} (${dupCount})</span>`;}else{btn.style.display='none';}}
function removeDuplicates(){const toRemove=files.filter(f=>f.isDuplicate);if(!toRemove.length)return;toRemove.forEach(f=>{if(f.thumbUrl)URL.revokeObjectURL(f.thumbUrl);});files=files.filter(f=>!f.isDuplicate);showToast(`${toRemove.length} ${t('dupesRemoved')}`,'success');markDuplicates();updateFolderInfo();updateUI();updRnPrev();saveSession();}

// RENAME
function isRnOn(){return document.getElementById('rnEnabled').checked;}
function isSeoOn(){return document.getElementById('seoSlug').checked;}
function keepFL(){return document.getElementById('keepFolders').checked;}
function slugify(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').replace(/-{2,}/g,'-');}
function slugifyFile(n){const p=n.split('.');const e=p.length>1?'.'+p.pop().toLowerCase():'';return slugify(p.join('.'))+e;}
function buildName(item,idx){const ext=item.actualMime?extFromMime(item.actualMime):getExt();if(item.customName){let n=item.customName;if(!n.match(/\.\w+$/))n+=ext;return isSeoOn()?slugifyFile(n):n;}const base=item.file.name.replace(/\.[^.]+$/,'');let res;if(isRnOn()){const pat=document.getElementById('rnPattern').value||'{nome}';const st=+document.getElementById('rnStart').value||1;const pd=Math.min(8,Math.max(1,+document.getElementById('rnPad').value||1));const dt=new Date().toISOString().slice(0,10);const fld=item.path?item.path.split('/').pop():'';res=pat.replace(/\{nome\}/g,base).replace(/\{n\}/g,String(st+idx).padStart(pd,'0')).replace(/\{data\}/g,dt).replace(/\{cartella\}/g,fld);}else res=base;res=isSeoOn()?slugify(res):res.replace(/[\\/:*?"<>|]/g,'').trim();return(res||'img-'+(idx+1))+ext;}
function getFullPath(item,idx){const name=buildName(item,idx);if(keepFL()&&item.path){return(isSeoOn()?item.path.split('/').map(slugify).join('/'):item.path)+'/'+name;}return name;}
function onRnChange(){const on=isRnOn();['rnPattern','rnStart','rnPad'].forEach(id=>document.getElementById(id).disabled=!on);const b=document.getElementById('rnBdg');b.textContent=on?t('patternActive'):(isSeoOn()?t('seoOnly'):t('inactive'));b.classList.toggle('on',on||isSeoOn()||keepFL());updRnPrev();updateUI();}
function insPH(ph){const i=document.getElementById('rnPattern');if(i.disabled)return showToast(t('enablePattern'),'info');const p=i.selectionStart??i.value.length;i.value=i.value.slice(0,p)+ph+i.value.slice(p);i.focus();onRnChange();}
function updRnPrev(){const c=document.getElementById('rnPrevRows');if(!files.length){c.innerHTML=`<div style="font-size:10px;color:var(--text-muted)">${t('loadPreview')}</div>`;return;}const samples=[];const seen=new Set();for(const f of files){if(samples.length>=5)break;const k=f.path||'__r';if(!seen.has(k)||samples.length<3){seen.add(k);samples.push(f);}}let ri=0;c.innerHTML=samples.map(it=>{const full=getFullPath(it,ri);const orig=(it.path?it.path+'/':'')+it.file.name;ri++;return`<div class="rp-r"><span class="old">${esc(orig)}</span><span class="ar">→</span><span class="nw">${esc(full)}</span></div>`;}).join('')+(files.length>5?`<div style="font-size:9px;color:var(--text-muted);margin-top:3px">… ${t('andMore')} ${files.length-5}</div>`:'');}

// WATERMARK
function setWmTab(tab,btn){wmTab=tab;document.querySelectorAll('.wm-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');document.getElementById('wmImageConfig').style.display=tab==='image'?'block':'none';document.getElementById('wmTextConfig').style.display=tab==='text'?'block':'none';updWmPrev();}
document.getElementById('wmImgInput').addEventListener('change',function(){const f=this.files[0];if(!f)return;wmImgFile=f;const url=URL.createObjectURL(f);wmImg=new Image();wmImg.onload=()=>{document.getElementById('wmUpArea').classList.add('has');document.getElementById('wmUpContent').innerHTML=`<img class="wm-th" src="${url}">`;updWmPrev();broadcastWatermark(wmImgFile);};wmImg.src=url;});
function onWmChange(){const on=document.getElementById('wmEnabled').checked;const b=document.getElementById('wmBdg');b.textContent=on?t('active'):t('inactive');b.classList.toggle('on',on);updWmPrev();}
function updWmPrev(){const box=document.getElementById('wmPrevBox');if(!document.getElementById('wmEnabled').checked||wmTab==='image'&&!wmImg){box.style.display='none';return;}box.style.display='block';const cv=document.getElementById('wmPrevCanvas'),ctx=cv.getContext('2d'),W=340,H=220;cv.width=W;cv.height=H;const cs=getComputedStyle(document.documentElement);ctx.fillStyle=cs.getPropertyValue('--checker1').trim();ctx.fillRect(0,0,W,H);const c2=cs.getPropertyValue('--checker2').trim();for(let y=0;y<H;y+=16)for(let x=0;x<W;x+=16)if((x/16+y/16)%2===0){ctx.fillStyle=c2;ctx.fillRect(x,y,16,16);}ctx.fillStyle=cs.getPropertyValue('--text-muted').trim();ctx.font='13px Inter';ctx.textAlign='center';ctx.fillText('📸',W/2,H/2);applyWm(ctx,W,H);}
function applyWm(ctx,cW,cH){if(wmTab==='image')applyImgWm(ctx,cW,cH);else applyTextWm(ctx,cW,cH);}
function applyImgWm(ctx,cW,cH){if(!wmImg)return;const sc=+document.getElementById('wmScale').value/100,op=+document.getElementById('wmOpacity').value/100,pos=document.getElementById('wmPos').value,wW=cW*sc,wH=(wmImg.height/wmImg.width)*wW,m=cW*0.03;let x,y;switch(pos){case'top-left':x=m;y=m;break;case'top-right':x=cW-wW-m;y=m;break;case'bottom-left':x=m;y=cH-wH-m;break;case'bottom-right':x=cW-wW-m;y=cH-wH-m;break;default:x=(cW-wW)/2;y=(cH-wH)/2;}ctx.globalAlpha=op;ctx.drawImage(wmImg,x,y,wW,wH);ctx.globalAlpha=1;}
function applyTextWm(ctx,cW,cH){const text=document.getElementById('wmText').value||'Watermark',font=document.getElementById('wmFont').value,color=document.getElementById('wmColor').value,pos=document.getElementById('wmTextPos').value,sizePct=+document.getElementById('wmTextSize').value/100,op=+document.getElementById('wmTextOpacity').value/100,rot=+document.getElementById('wmTextRot').value,fontSize=Math.max(10,Math.round(cW*sizePct)),m=cW*0.04;ctx.save();ctx.globalAlpha=op;ctx.fillStyle=color;ctx.font=`bold ${fontSize}px "${font}",sans-serif`;ctx.textBaseline='middle';let x,y,align='left';switch(pos){case'top-left':x=m;y=m+fontSize/2;break;case'top-right':x=cW-m;y=m+fontSize/2;align='right';break;case'bottom-left':x=m;y=cH-m-fontSize/2;break;case'bottom-right':x=cW-m;y=cH-m-fontSize/2;align='right';break;default:x=cW/2;y=cH/2;align='center';}ctx.textAlign=align;if(rot){ctx.translate(x,y);ctx.rotate(rot*Math.PI/180);ctx.fillText(text,0,0);}else ctx.fillText(text,x,y);ctx.restore();}

// SORTING
function savingsPct(f){if(f.optimizedSize===null||!f.originalSize)return -1;return Math.max(0,((f.originalSize-f.optimizedSize)/f.originalSize*100));}
const statusOrder={pending:0,processing:1,done:2,error:3};
function sortFiles(field){sortAsc=(sortField===field)?!sortAsc:true;sortField=field;const dir=sortAsc?1:-1;files.sort((a,b)=>{let av,bv;if(field==='name'){av=a.file.name.toLowerCase();bv=b.file.name.toLowerCase();return av<bv?-1*dir:av>bv?1*dir:0;}if(field==='originalSize'){av=a.originalSize;bv=b.originalSize;}else if(field==='optimizedSize'){av=a.optimizedSize??-1;bv=b.optimizedSize??-1;}else if(field==='savings'){av=savingsPct(a);bv=savingsPct(b);}else if(field==='status'){av=statusOrder[a.status]??0;bv=statusOrder[b.status]??0;}return(av-bv)*dir;});['originalSize','optimizedSize','savings','status'].forEach(f=>{const arr=document.getElementById('arr'+f.charAt(0).toUpperCase()+f.slice(1));if(!arr)return;arr.classList.toggle('on',sortField===f);arr.textContent=(sortField===f&&!sortAsc)?'▲':'▼';});updateUI();}

document.getElementById('dragGhostImg').src=it.thumbUrl||'';document.getElementById('dragGhostName').textContent=it.file.name;ghost.style.display='flex';

// CROP TOOL
let cropCv,cropCtx,cropImg,cropRatio=0;
let crop={x:0,y:0,w:0,h:0,cvW:0,cvH:0};
let cropTargets=[],cropActiveIdx=0;
// crop.xFrac etc keep the rectangle's position/size as fractions (0-1) of the canvas,
// so switching the reference thumbnail (different aspect ratio) keeps the same relative crop.
function openCropModal(){cropTargets=files.filter(f=>f.selected);if(!cropTargets.length)return showToast(t('noFileSelected'),'info');document.getElementById('cropModal').classList.add('vis');cropCv=document.getElementById('cropCanvas');cropCtx=cropCv.getContext('2d');cropRatio=0;document.querySelectorAll('.crop-preset-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
document.getElementById('cropAnchorRow').classList.toggle('vis',cropTargets.length>1);
document.getElementById('cropAnchorNote').style.display=cropTargets.length>1?'block':'none';
document.getElementById('cropAnchorMode').value='exact';
cropActiveIdx=0;renderCropThumbs();loadCropPreview(0,true);}
function renderCropThumbs(){const box=document.getElementById('cropThumbs');if(cropTargets.length<2){box.innerHTML='';box.style.display='none';return;}box.style.display='flex';box.innerHTML=cropTargets.map((f,i)=>`<img class="crop-thumb${i===cropActiveIdx?' active':''}" src="${f.thumbUrl}" onclick="loadCropPreview(${i},false)">`).join('');}
function loadCropPreview(i,initial){cropActiveIdx=i;renderCropThumbs();const f=cropTargets[i];const prevFrac=initial?{x:0.15,y:0.15,w:0.7,h:0.7}:{x:crop.x/crop.cvW,y:crop.y/crop.cvH,w:crop.w/crop.cvW,h:crop.h/crop.cvH};
cropImg=new Image();cropImg.onload=()=>{const maxW=760,maxH=400;let w=cropImg.width,h=cropImg.height;if(w>maxW||h>maxH){const s=Math.min(maxW/w,maxH/h);w*=s;h*=s;}cropCv.width=w;cropCv.height=h;cropCtx.drawImage(cropImg,0,0,w,h);crop={x:prevFrac.x*w,y:prevFrac.y*h,w:prevFrac.w*w,h:prevFrac.h*h,cvW:w,cvH:h};updateCropBox();document.getElementById('cropInfo').textContent=`${Math.round(crop.w)}×${Math.round(crop.h)} px · ${t('cropWillApplyTo')} ${cropTargets.length} ${t('files')}`;};
cropImg.src=f.thumbUrl;}
function updateCropBox(){const box=document.getElementById('cropBox');if(cropRatio>0)crop.h=crop.w/cropRatio;crop.x=Math.max(0,Math.min(crop.x,crop.cvW-crop.w));crop.y=Math.max(0,Math.min(crop.y,crop.cvH-crop.h));box.style.left=crop.x+'px';box.style.top=crop.y+'px';box.style.width=crop.w+'px';box.style.height=crop.h+'px';}
function setCropRatio(r,btn){cropRatio=r;document.querySelectorAll('.crop-preset-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(r>0){crop.h=crop.w/r;crop.h=Math.min(crop.h,crop.cvH-crop.y);}updateCropBox();}

// Crop box interactions
(function(){let mode=null,sx,sy;
document.getElementById('cropBox').addEventListener('mousedown',e=>{e.preventDefault();if(e.target.id==='cropHandleSE')mode='resize';else mode='move';sx=e.clientX;sy=e.clientY;});
document.addEventListener('mousemove',e=>{if(!mode)return;const dx=e.clientX-sx,dy=e.clientY-sy;sx=e.clientX;sy=e.clientY;
if(mode==='move'){crop.x+=dx;crop.y+=dy;}
else if(mode==='resize'){crop.w=Math.max(40,crop.w+dx);if(cropRatio>0)crop.h=crop.w/cropRatio;else crop.h=Math.max(40,crop.h+dy);crop.w=Math.min(crop.w,crop.cvW-crop.x);crop.h=Math.min(crop.h,crop.cvH-crop.y);}
updateCropBox();document.getElementById('cropInfo').textContent=`${Math.round(crop.w)}×${Math.round(crop.h)} px`;});
document.addEventListener('mouseup',()=>{mode=null;});
})();

function applyCrop(){const targets=cropTargets.length?cropTargets:files.filter(f=>f.selected);if(!targets.length)return closeCropModal();
const fracW=crop.w/crop.cvW,fracH=crop.h/crop.cvH;
const mode=targets.length>1?document.getElementById('cropAnchorMode').value:'exact';
let fracX,fracY;
if(mode==='exact'){fracX=crop.x/crop.cvW;fracY=crop.y/crop.cvH;}
else{const hA=mode.includes('left')?'left':mode.includes('right')?'right':'center';const vA=mode.includes('top')?'top':mode.includes('bottom')?'bottom':'center';
fracX=hA==='left'?0:hA==='right'?1-fracW:(1-fracW)/2;
fracY=vA==='top'?0:vA==='bottom'?1-fracH:(1-fracH)/2;}
targets.forEach(f=>f.cropData={cropX:fracX,cropY:fracY,cropW:fracW,cropH:fracH,canvasW:1,canvasH:1});
closeCropModal();const n=targets.length;selAll(true);updateUI();showToast(`${t('cropApplied')} ${n} ${t('files')}. ${t('cropNote')}`,'success');saveSession();}
function removeCrop(idx,e){if(e)e.stopPropagation();if(!files[idx])return;files[idx].cropData=null;updateUI();showToast(t('cropRemoved'),'info');saveSession();}
function closeCropModal(){document.getElementById('cropModal').classList.remove('vis');}

const sp=it.optimizedSize!==null?Math.max(0,((it.originalSize-it.optimizedSize)/it.originalSize*100)).toFixed(1):null;const sc=sp!==null?(+sp>50?'great':(+sp>20?'good':'low')):'';const nc=showNew||it.customName;
let nameCell;if(it.editing){const cn=it.customName||it.file.name.replace(/\.[^.]+$/,'');nameCell=`<input class="fname-input" id="in_${idx}" value="${esc(cn)}" onblur="finEdit(${idx})" onkeydown="if(event.key==='Enter')finEdit(${idx});if(event.key==='Escape'){files[${idx}].editing=false;updateUI();}">`;}else nameCell=`<div class="fname" onclick="startEdit(${idx})" title="${t('clickToRename')}">${esc(it.customName||it.file.name)}</div>`;

// ===== FORMAT FALLBACK CHAIN =====
// Ensures AVIF/WebP always degrade gracefully to a format the browser can actually encode,
// and verifies the blob.type really matches what we asked for (some browsers silently
// substitute PNG without erroring).
function mimeChainFor(fmt){if(fmt==='avif')return['image/avif','image/webp','image/jpeg'];if(fmt==='webp')return['image/webp','image/jpeg'];if(fmt==='jpeg')return['image/jpeg'];return['image/png'];}
function extFromMime(m){return{'image/webp':'.webp','image/jpeg':'.jpg','image/avif':'.avif','image/png':'.png'}[m]||'.jpg';}
function encodeWithFallbackMain(canvas,chain,quality){return new Promise(resolve=>{let i=0;function tryNext(){if(i>=chain.length){canvas.toBlob(b=>resolve({blob:b,mime:'image/png'}),'image/png');return;}const mime=chain[i++];canvas.toBlob(b=>{if(b&&b.size>0&&b.type===mime)resolve({blob:b,mime});else tryNext();},mime,mime==='image/png'?undefined:quality);}tryNext();});}

function initWorkerPool(){if(!canUseWorkers||workersReady)return;try{const blob=new Blob([WORKER_SOURCE],{type:'application/javascript'});const url=URL.createObjectURL(blob);for(let i=0;i<WORKER_COUNT;i++){const w=new Worker(url);w._busy=false;w._resolvers={};w.onmessage=e=>{const d=e.data;const res=w._resolvers[d.id];if(res){delete w._resolvers[d.id];w._busy=false;res(d);processQueue();}};w.onerror=err=>console.error('Worker error',err);if(wmImgFile)w.postMessage({type:'setWatermark',blob:wmImgFile});workerPool.push(w);}workersReady=true;}catch(err){console.error('initWorkerPool failed',err);workersReady=false;}}
function processQueue(){if(!taskQueue.length)return;const w=workerPool.find(w=>!w._busy);if(!w)return;const task=taskQueue.shift();w._busy=true;w._resolvers[task.msg.id]=task.resolve;w.postMessage(task.msg);}
function runInWorker(msg){return new Promise(resolve=>{const id=++taskIdCounter;taskQueue.push({msg:{...msg,id},resolve});processQueue();});}
function broadcastWatermark(fileOrNull){workerPool.forEach(w=>w.postMessage({type:'setWatermark',blob:fileOrNull}));}

async function startOptimization(){if(isProcessing)return;const sel=files.filter(f=>f.selected);if(!sel.length)return showToast(t('noFileSelected'),'error');isProcessing=true;const btn=document.getElementById('btnOpt');btn.disabled=true;btn.innerHTML='⏳ '+t('optimizing');refreshDownloadButtons();document.getElementById('btnDl').disabled=true;const bsf0=document.getElementById('btnSaveFolder');if(bsf0)bsf0.disabled=true;const ps=document.getElementById('progSec');ps.classList.add('vis');document.getElementById('progBar').style.width='0%';let done=0;const total=sel.length,t0=Date.now();const indices=files.map((f,i)=>f.selected?i:-1).filter(i=>i>=0);
lastOptSnapshot=indices.map(idx=>({ref:files[idx],prevStatus:files[idx].status,prevBlob:files[idx].optimizedBlob,prevSize:files[idx].optimizedSize,prevMime:files[idx].actualMime,prevFallback:files[idx].formatFallback}));
if(canUseWorkers)initWorkerPool();
const concurrency=canUseWorkers&&workerPool.length?workerPool.length:3;

// Dispatches to the worker pool when available, else to the main-thread path below.
// Both paths share the exact same crop/resize/rotate/watermark/format-fallback semantics.
async function processOneFile(item){
    const quality=+document.getElementById('qSlider').value/100;
    const maxRes=+document.getElementById('rSlider').value;
    const fixedOn=document.getElementById('fixedEnabled').checked;
    const fixedW=+document.getElementById('fixedW').value||1000;
    const fixedH=+document.getElementById('fixedH').value||1000;
    const padSel=document.getElementById('fixedPad').value;
    const padColor=padSel==='custom'?document.getElementById('fixedColor').value:padSel;
    const copyright=document.getElementById('copyrightText').value.trim();
    const mimeChain=mimeChainFor(currentFormat);
    const cfg={cropData:item.cropData,rotation:item.rotation,flipH:item.flipH,flipV:item.flipV,fixedOn,fixedW,fixedH,padColor,maxRes,copyright,mimeChain,quality};
    if(canUseWorkers){
        const wm=currentWmConfig();
        const res=await runInWorker({type:'optimize',file:item.file,wm,...cfg});
        if(!res.ok)throw new Error(res.error||'worker failed');
        return{blob:res.blob,mime:res.mime};
    }
    return await optimizeImageMainThread(item,cfg);
}

// Main-thread fallback (used when OffscreenCanvas/Worker aren't available, e.g. older Safari).
// Uses createImageBitmap + explicit .close() so decoded pixel buffers are released immediately
// instead of waiting on GC, and never holds more than one image's worth of canvases at a time.
async function optimizeImageMainThread(item,cfg){
    const bitmap=await createImageBitmap(item.file);
    let srcX=0,srcY=0,srcW=bitmap.width,srcH=bitmap.height;
    if(cfg.cropData){
        const cd=cfg.cropData;
        srcX=Math.round(cd.cropX*bitmap.width);srcY=Math.round(cd.cropY*bitmap.height);
        srcW=Math.round(cd.cropW*bitmap.width);srcH=Math.round(cd.cropH*bitmap.height);
        srcX=Math.max(0,Math.min(srcX,bitmap.width-1));
        srcY=Math.max(0,Math.min(srcY,bitmap.height-1));
        srcW=Math.min(srcW,bitmap.width-srcX);
        srcH=Math.min(srcH,bitmap.height-srcY);
    }
    let w=srcW,h=srcH,canvas,ctx;
    if(cfg.fixedOn){
        const sc=Math.min(cfg.fixedW/w,cfg.fixedH/h,1);
        const sw=Math.round(w*sc),sh=Math.round(h*sc);
        canvas=document.createElement('canvas');canvas.width=cfg.fixedW;canvas.height=cfg.fixedH;
        ctx=canvas.getContext('2d');
        if(cfg.padColor!=='transparent'){ctx.fillStyle=cfg.padColor;ctx.fillRect(0,0,cfg.fixedW,cfg.fixedH);}
        ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
        ctx.drawImage(bitmap,srcX,srcY,srcW,srcH,Math.round((cfg.fixedW-sw)/2),Math.round((cfg.fixedH-sh)/2),sw,sh);
    }else{
        if(w>cfg.maxRes||h>cfg.maxRes){if(w>=h){h=Math.round(h/w*cfg.maxRes);w=cfg.maxRes;}else{w=Math.round(w/h*cfg.maxRes);h=cfg.maxRes;}}
        canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
        ctx.drawImage(bitmap,srcX,srcY,srcW,srcH,0,0,w,h);
    }
    bitmap.close();
    if(item.rotation||item.flipH||item.flipV){
        const rad=item.rotation*Math.PI/180;
        const swapDims=(item.rotation===90||item.rotation===270);
        const rw=swapDims?canvas.height:canvas.width, rh=swapDims?canvas.width:canvas.height;
        const rCanvas=document.createElement('canvas');rCanvas.width=rw;rCanvas.height=rh;
        const rCtx=rCanvas.getContext('2d');
        rCtx.translate(rw/2,rh/2);rCtx.rotate(rad);rCtx.scale(item.flipH?-1:1,item.flipV?-1:1);
        rCtx.drawImage(canvas,-canvas.width/2,-canvas.height/2);
        canvas=rCanvas;ctx=rCtx;
    }
    if(cfg.copyright){ctx.save();ctx.globalAlpha=0.7;ctx.fillStyle='#fff';ctx.font='12px Inter,sans-serif';ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillText(cfg.copyright,canvas.width-8,canvas.height-8);ctx.restore();}
    if(document.getElementById('wmEnabled').checked)applyWm(ctx,canvas.width,canvas.height);
    return await encodeWithFallbackMain(canvas,cfg.mimeChain,cfg.quality);
}

// SAVE TO FOLDER (File System Access API — Chrome/Edge only, graceful fallback to ZIP elsewhere)
const hasFSAccess=typeof window.showDirectoryPicker==='function';
async function saveToFolder(){
    const done=files.filter(f=>f.status==='done'&&f.selected);
    if(!done.length)return showToast(t('noFiles'),'error');
    if(!hasFSAccess){showToast(t('fsaUnsupported'),'info');return downloadZip();}
    const btn=document.getElementById('btnSaveFolder');
    try{
        const rootHandle=await window.showDirectoryPicker();
        btn.disabled=true;btn.innerHTML='⏳ '+t('creatingZip');
        const nc={};let ri=0;
        for(const f of files){
            if(f.status!=='done'||!f.selected)continue;
            let name=buildName(f,ri);ri++;
            const fk=(keepFL()&&f.path?f.path+'/':'')+name;
            if(nc[fk]){nc[fk]++;const p=name.split('.'),e=p.pop();name=p.join('.')+`-${nc[fk]}.${e}`;}else nc[fk]=1;
            let dirHandle=rootHandle;
            if(keepFL()&&f.path){const parts=(isSeoOn()?f.path.split('/').map(slugify):f.path.split('/'));for(const part of parts){if(!part)continue;dirHandle=await dirHandle.getDirectoryHandle(part,{create:true});}}

    }catch(err){
        if(err&&err.name==='AbortError'){/* user cancelled the picker, no error toast */}

async function clearSession(){try{const db=await openDB();const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).delete('files');}catch(e){}}
async function checkSessionOnLoad(){if(sessionSuppressed)return;const data=await loadSessionData();if(!data||!data.length||files.length)return;document.getElementById('sessionInfo').textContent=`${data.length} ${t('files')}`;document.getElementById('sessionBanner').classList.add('vis');window._pendingSession=data;}
async function restoreSession(){const data=window._pendingSession;if(!data)return;document.getElementById('sessionBanner').classList.remove('vis');addFiles(data.map(d=>({file:d.file,path:d.path})));data.forEach((d,i)=>{const f=files[files.length-data.length+i];if(!f)return;f.customName=d.customName;f.cropData=d.cropData;f.rotation=d.rotation||0;f.flipH=!!d.flipH;f.flipV=!!d.flipV;f.selected=d.selected!==false;});updateUI();updRnPrev();showToast(t('sessionRestore'),'success');}
function dismissSession(){sessionSuppressed=true;document.getElementById('sessionBanner').classList.remove('vis');clearSession();}

// UTILS
function fmtSize(b){if(!b)return'0 B';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';if(b<1073741824)return(b/1048576).toFixed(2)+' MB';return(b/1073741824).toFixed(2)+' GB';}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function showToast(m,tp='info'){const c=document.getElementById('toastC'),el=document.createElement('div');el.className=`toast ${tp}`;el.innerHTML=`${{success:'✅',error:'❌',info:'ℹ️'}[tp]||'ℹ️'} ${m}`;c.appendChild(el);setTimeout(()=>el.remove(),3000);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePrev();closeCropModal();}});

// INIT
initTheme();curLang=localStorage.getItem('lang')||'it';document.getElementById('langIt').classList.toggle('active',curLang==='it');document.getElementById('langEn').classList.toggle('active',curLang==='en');
checkAvif();renderPresets();updateUI();onRnChange();onWmChange();onFixedChange();onMetaChange();applyI18n();checkSessionOnLoad();
</script>
